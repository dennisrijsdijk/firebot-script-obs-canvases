<eos-container header="OBS Text Source">
    <div>
        <button class="btn btn-link" ng-click="getTextSources()">Refresh Source Data</button>
    </div>
    <ui-select ng-if="textSources != null" ng-model="selected" on-select="selectTextSource($select.selected)">
        <ui-select-match placeholder="Select a Text Source...">{{$select.selected.inputName}}</ui-select-match>
        <ui-select-choices repeat="source in textSources | filter: {inputName: $select.search}">
            <div ng-bind-html="source.inputName | highlight: $select.search"></div>
        </ui-select-choices>
        <ui-select-no-choice>
            <b>No text sources found.</b>
        </ui-select-no-choice>
    </ui-select>
    <div ng-if="textSources == null" class="muted">
        No sources found. Is OBS connected?
    </div>
</eos-container>
<eos-container ng-if="textSources != null && effect.textSourceUuid != null" header="Text" style="margin-top: 10px;"
    pad-top="true">
    <label class="control-fb control--checkbox">Use file as text source
        <input type="checkbox" ng-click="toggleSource()" ng-checked="effect.textSource === 'file'" aria-label="...">
        <div class="control__indicator"></div>
    </label>
    <firebot-input ng-if="effect.textSource === 'static'" model="effect.text" use-text-area="true"></firebot-input>
    <file-chooser ng-if="effect.textSource === 'file'" model="effect.file"
        options="{ filters: [ {name: 'Text File', extensions: ['txt']}, {name: 'All Files', extensions: ['*']} ]}"
        on-update="textFileUpdated(filepath)"></file-chooser>
</eos-container>
